# XcodeGen project spec — run `xcodegen generate` in this directory on a Mac
# to produce Screenshot2Cal.xcodeproj (never committed). See
# docs/setup-apple.md for the full walkthrough, including the values to
# substitute for DEVELOPMENT_TEAM and the CloudFront domain.
name: Screenshot2Cal
options:
  bundleIdPrefix: digital.callaeas
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: HJ33GW58G8
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # iPhone-only (1). The app is portrait-only; going universal would require
    # all four orientations for iPad multitasking (App Store error 90474).
    TARGETED_DEVICE_FAMILY: "1"

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0

targets:
  Screenshot2Cal:
    type: application
    platform: iOS
    sources:
      - App
      - Shared
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - target: ShareExtension
    entitlements:
      path: App/App.entitlements
      properties:
        com.apple.security.application-groups:
          - group.digital.callaeas.s2c
        com.apple.developer.associated-domains:
          - applinks:d1n6hy34w2a6gq.cloudfront.net
        keychain-access-groups:
          - $(AppIdentifierPrefix)digital.callaeas.s2c.shared
    info:
      path: App/Info.plist
      properties:
        # Exposes the team-identifier prefix at runtime so KeychainStore can build
        # the correctly-prefixed keychain access group (else the JWT never persists).
        AppIdentifierPrefix: "$(AppIdentifierPrefix)"
        CFBundleDisplayName: Screenshot to Calendar
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Paste the *iOS* OAuth client id from Google Cloud console:
        GIDClientID: 907447794937-uq3mpclcbo673ojt653ntjdarl2g2dmv.apps.googleusercontent.com
        # Paste the *web* OAuth client id — required for serverAuthCode:
        GIDServerClientID: 907447794937-uvs008f9lkvjai2d0l57puhaoldkmhs2.apps.googleusercontent.com
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              # The reversed iOS client id, e.g. com.googleusercontent.apps.1234-abc
              - com.googleusercontent.apps.907447794937-uq3mpclcbo673ojt653ntjdarl2g2dmv
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: digital.callaeas.s2c
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - ShareExtension
      - Shared
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.digital.callaeas.s2c
        keychain-access-groups:
          - $(AppIdentifierPrefix)digital.callaeas.s2c.shared
    info:
      path: ShareExtension/Info.plist
      properties:
        # Same as the app target: KeychainStore (shared) needs the prefix at runtime.
        AppIdentifierPrefix: "$(AppIdentifierPrefix)"
        CFBundleDisplayName: Capture Event
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsImageWithMaxCount: 1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: digital.callaeas.s2c.share
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
