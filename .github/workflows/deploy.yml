name: Deploy

# Merge to main → CI → deploy staging → pause at prod until approved in the
# Actions UI (required-reviewer rule on the prod environment). Ignored prod
# gates expire after 30 days and can be rejected in the UI.
#
# workflow_dispatch reruns the same pipeline: "redeploy staging" = dispatch and
# don't approve prod; "redeploy prod" = dispatch and approve. Prod can never
# receive a commit that didn't just deploy to staging.
#
# Deliberate omissions: no paths filter (a docs-only merge redeploys staging —
# idempotent, and keeps staging exactly at main); no auto-approval of prod.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # GitHub OIDC → AWS role
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  staging:
    needs: ci
    uses: ./.github/workflows/deploy-stage.yml
    with: { stage: staging }

  prod:
    needs: staging
    uses: ./.github/workflows/deploy-stage.yml
    with: { stage: prod }
