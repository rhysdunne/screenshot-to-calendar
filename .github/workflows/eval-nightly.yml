name: Nightly eval smoke

# A small live eval (10 cases, one model, ~$0.10) so extraction quality drift
# — from model updates or accidental prompt changes — shows up within a day.
on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'rhysdunne' }} # don't run on forks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - run: npm ci --prefix backend
      - run: npm ci --prefix evals
      - name: Run live smoke eval
        working-directory: evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run eval -- --models claude-haiku-4-5 --dataset synthetic --limit 10 --label nightly
      - uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.run_id }}
          path: evals/reports/nightly/
