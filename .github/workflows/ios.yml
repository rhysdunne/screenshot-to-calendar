name: iOS

# Compile check only — no signing, no tests (no XCTest target exists yet).
# Separate from ci.yml so the deploy pipeline doesn't rerun a macOS build
# before backend deploys. macOS runners are free on public repos.
on:
  pull_request:

jobs:
  ios-build: # job id = required-check context in the protect-main ruleset
    runs-on: macos-26
    timeout-minutes: 30
    defaults:
      run: { working-directory: ios }
    steps:
      - uses: actions/checkout@v7
      # Pinned to the same Xcode build (17F42) as the Xcode Cloud TestFlight
      # workflow, so CI and the release lane compile with one toolchain.
      # Fails loudly if a runner-image update drops this version.
      - run: sudo xcode-select --switch /Applications/Xcode_26.5.app
      - run: brew install xcodegen
      - run: xcodegen generate
      - run: >
          xcodebuild build -scheme Screenshot2Cal
          -destination 'generic/platform=iOS'
          CODE_SIGNING_ALLOWED=NO
